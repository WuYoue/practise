    <script>
      class myPromise {
        state = "pending";
        value = null;
        reason = null;
        _thenFns = {
          resolvedFns: [],
          rejectedFns: [],
        };
        constructor(executor) {
          try {
            executor(this.resolve, this.reject);
          } catch (err) {
            this.reject(err);
          }
        }
        resolve = (value) => {
          if (this.state !== "pending") return;
          this.state = "resolved";

          console.log("resolve", value);

          this.value = value;
          queueMicrotask(() => {
            console.log("resolve-queue");

            this._thenFns.resolvedFns.forEach((fn) => fn(value));
          });
        };
        reject = (reason) => {
          if (this.state !== "pending") return;
          this.state = "rejected";

          console.log("reject", reason);
          this.reason = reason;
          queueMicrotask(() => {
            console.log("reject-queue");

            this._thenFns.rejectedFns.forEach((fn) => fn(reason));
          });
        };
        then(onResolved, onRejected) {
          onResolved = typeof onResolved === "function" ? onResolved : (v) => v;
          onRejected =
            typeof onRejected === "function"
              ? onRejected
              : (err) => {
                  throw err;
                };
          return new myPromise((resolve, reject) => {
            if (this.state === "pending") {
              this._thenFns.resolvedFns.push(() => {
                try {
                  const result = onResolved(this.value);
                  resolve(result);
                } catch (err) {
                  reject(err);
                }
              });
              this._thenFns.rejectedFns.push(() => {
                try {
                  const result = onRejected(this.reason);
                  resolve(result);
                } catch (err) {
                  reject(err);
                }
              });
            }
            if (this.state === "resolved") {
              queueMicrotask(() => {
                try {
                  const result = onResolved(this.value);
                  resolve(result);
                } catch (err) {
                  reject(err);
                }
              });
            }
            if (this.state === "rejected") {
              queueMicrotask(() => {
                try {
                  const result = onRejected(this.reason);
                  resolve(result);
                } catch (err) {
                  reject(err);
                }
              });
            }
          });
        }
        catch(onRejected) {
          return this.then(undefined, onRejected);
        }

        finally(onFinally) {
          return this.then(
            (value) => {
              onFinally();
              return value;
            },
            (reason) => {
              onFinally();
              throw reason;
            },
          );
        }

        static resolve(value) {
          return new myPromise((resolve) => {
            resolve(value);
          });
        }

        static reject(reason) {
          return new myPromise((resolve, reject) => {
            reject(reason);
          });
        }

        static all(promises) {
          return new myPromise((resolve, reject) => {
            const results = [];
            promises.forEach((promise, index) => {
              promise
                .then((res) => {
                  results[index] = res;
                  if (results.length === promises.length) {
                    resolve(results);
                  }
                })
                .catch((err) => {
                  reject(err);
                });
            });
          });
        }
        static allSettled(promises) {
          return new myPromise((resolve) => {
            const results = [];
            promises.forEach((promise, index) => {
              promise
                .then((res) => {
                  results[index] = {
                    status: "fulfilled",
                    value: res,
                  };
                  if (results.length === promises.length) {
                    resolve(results);
                  }
                })
                .catch((err) => {
                  results[index] = {
                    status: "rejected",
                    reason: err,
                  };
                  if (results.length === promises.length) {
                    console.log("allSettled");

                    resolve(results);
                  }
                });
            });
          });
        }
        static race(promises) {
          return new myPromise((resolve, reject) => {
            promises.forEach((promise) => {
              promise.then(resolve).catch(reject);
            });
          });
        }

        static any(promises) {
          return new myPromise((resolve, reject) => {
            const errors = [];
            promises.forEach((promise, index) => {
              promise.then(resolve).catch((err) => {
                errors[index] = err;
                if (errors.length === promises.length) {
                  console.log("aaaaaaaaaaaaaaaa");

                  reject(
                    new AggregateError(errors, "All promises were rejected"),
                  );
                }
              });
            });
          });
        }
      }
      const P1 = new myPromise((resolve, reject) => {
        setTimeout(() => {
          reject("P1");
        }, 1900);
      });
      const P2 = new myPromise((resolve, reject) => {
        setTimeout(() => {
          reject("P2");
        }, 1000);
      });
      myPromise
        .allSettled([P1, P2])
        .then((res) => {
          console.log(res);
        })
        .catch((err) => {
          console.log(err);
        });
