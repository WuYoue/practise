    <title>bind函数</title>

  <body>
    <script>
      function myBind(thisArg, ...args) {
        if (typeof this !== "function") throw Error("调用bind必须是函数");
        thisArg = Object(thisArg ?? globalThis);

        const _this = this;

        return function (...args2) {
          const fnSymbol = Symbol("fn");

          if (new.target) return new _this(...args, ...args2);
          // console.log(_this);

          thisArg[fnSymbol] = _this;

          let result = thisArg[fnSymbol](...args, ...args2);
          Reflect.deleteProperty(thisArg, fnSymbol);
          return result;
        };
      }

      Function.prototype.myBind = myBind;
      let i = 0;
      function foo(a, b, c) {
        console.log(this);

        if (i < 3) {
          i++;
          foo(a, b, c);
        }
        console.log(a, b, c);

        return "a";
      }
